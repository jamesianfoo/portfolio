<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>Protected Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            background: #2a2a2a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading */
        .staticrypt-spinner-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Content */
        #staticrypt_content {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }

        .lock-icon {
            margin-bottom: 2rem;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        /* Form */
        #staticrypt-form {
            width: 100%;
            max-width: 500px;
        }

        .input-row {
            display: flex;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        #staticrypt-password {
            flex: 1;
            border: none;
            outline: none;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            background: transparent;
            color: #111;
        }

        #staticrypt-password::placeholder {
            color: #9ca3af;
        }

        .staticrypt-decrypt-button {
            background: #fff;
            border: none;
            border-left: 1px solid #e5e7eb;
            padding: 0 1.25rem;
            cursor: pointer;
            color: #374151;
            font-size: 1.25rem;
            line-height: 1;
            transition: background 0.15s;
        }

        .staticrypt-decrypt-button:hover {
            background: #f3f4f6;
        }

        #staticrypt-remember-label { display: none !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

        <div class="staticrypt-spinner"></div>
    </div>

                <path d="M19 28V20a11 11 0 0 1 22 0v8" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <circle cx="30" cy="40" r="3.5" fill="#6b7280"/>
                <line x1="30" y1="43.5" x2="30" y2="47.5" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>

        <h1>This content is protected.</h1>
        <p class="subtitle">To view, please enter the password.</p>

        <form id="staticrypt-form" action="#" method="post">
            <div class="input-row">
                <input
                    id="staticrypt-password"
                    type="password"
                    name="password"
                    placeholder="Enter password"

                />
                <button type="submit" class="staticrypt-decrypt-button">&#8594;</button>
            </div>
