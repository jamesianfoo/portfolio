<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sous Pantry Thumbnail — 800×520</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 800px;
    height: 520px;
    overflow: hidden;
    background: #0D1117;
  }

  .thumbnail {
    width: 800px;
    height: 520px;
    position: relative;
    overflow: hidden;
    /* Dark navy with subtle warm gradient */
    background:
      radial-gradient(ellipse 60% 80% at 75% 50%, rgba(200,90,42,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 50% 60% at 20% 20%, rgba(26,107,92,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(13,17,30,0.8) 0%, transparent 60%),
      #0D1117;
  }

  /* ── LEFT TEXT ─────────────────────────────────────────────── */
  .text-block {
    position: absolute;
    left: 52px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 260px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #C85A2A;
    background: rgba(200,90,42,0.12);
    border: 1px solid rgba(200,90,42,0.28);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 18px;
  }

  .tag::before {
    content: '';
    width: 5px; height: 5px;
    background: #C85A2A;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 30px;
    line-height: 1.15;
    color: #fff;
    margin-bottom: 14px;
  }

  h1 em {
    font-style: italic;
    color: rgba(255,255,255,0.45);
  }

  p {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    line-height: 1.6;
    color: rgba(255,255,255,0.45);
    margin-bottom: 22px;
  }

  .pills {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    width: fit-content;
  }

  .pill::before {
    content: '';
    width: 3px; height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── PHONES STAGE ──────────────────────────────────────────── */
  .phones-stage {
    position: absolute;
    right: 0;
    top: 0;
    width: 480px;
    height: 520px;
  }

  /* ── SHARED PHONE STYLES ───────────────────────────────────── */
  .phone {
    position: absolute;
    border-radius: 36px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.12);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.6),
      0 24px 56px rgba(0,0,0,0.65),
      0 4px 12px rgba(0,0,0,0.4);
  }

  .phone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(140deg, rgba(255,255,255,0.05) 0%, transparent 45%);
    pointer-events: none;
    border-radius: inherit;
  }

  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .di {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    border-radius: 12px;
    z-index: 5;
  }

  /* ── PHONE 3 — bottom layer, right ────────────────────────── */
  .phone-3 {
    width: 186px;
    height: 374px;
    right: 24px;
    bottom: -10px;
    z-index: 1;
    opacity: 0.55;
    filter: brightness(0.75);
    border-radius: 30px;
    transform: rotate(4deg);
  }
  .phone-3 .di { width: 66px; height: 18px; }

  /* ── PHONE 2 — middle layer, left ─────────────────────────── */
  .phone-2 {
    width: 200px;
    height: 402px;
    left: 30px;
    top: 50%;
    transform: translateY(-50%) rotate(-3.5deg);
    z-index: 2;
    opacity: 0.72;
    filter: brightness(0.85);
  }
  .phone-2 .di { width: 72px; height: 19px; }

  /* ── PHONE 1 — top layer, center ──────────────────────────── */
  .phone-1 {
    width: 222px;
    height: 448px;
    left: 50%;
    top: 50%;
    transform: translate(-46%, -50%);
    z-index: 3;
  }
  .phone-1 .di { width: 80px; height: 22px; }

  /* Fade edge on right so phones don't hard-clip */
  .phones-stage::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 60px; height: 100%;
    background: linear-gradient(to right, transparent, #0D1117);
    z-index: 20;
    pointer-events: none;
  }

  /* Fade edge on left of phones stage — blends into text area */
  .phones-stage::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 100%;
    background: linear-gradient(to right, #0D1117, transparent);
    z-index: 20;
    pointer-events: none;
  }

  /* ── FOOTER CREDIT ─────────────────────────────────────────── */
  .credit {
    position: absolute;
    bottom: 18px;
    left: 52px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.16);
    z-index: 30;
  }

  /* ── THIN ACCENT LINE ──────────────────────────────────────── */
  .accent-line {
    position: absolute;
    left: 52px;
    top: 50%;
    transform: translateY(calc(-50% + 72px));
    width: 32px;
    height: 2px;
    background: #C85A2A;
    opacity: 0.7;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="thumbnail">

  <!-- LEFT TEXT -->
  <div class="text-block">
    <div class="tag">WIP · Solo Build · 2026</div>
    <h1>One designer.<br>One AI.<br><em>One full-stack app.</em></h1>
    <p>Built solo with Claude Code — from zero to shipped.</p>
    <div class="pills">
      <span class="pill">iOS · Android · Express.js</span>
      <span class="pill">Claude Code · Anthropic API</span>
      <span class="pill">Developer Experience audit</span>
    </div>
  </div>

  <div class="accent-line"></div>

  <!-- PHONES -->
  <div class="phones-stage">

    <!-- Phone 3: bottom layer, right — Plan & Cook -->
    <div class="phone phone-3">
      <div class="di"></div>
      <img src="souspantry-3.PNG" alt="Plan and Cook screen">
    </div>

    <!-- Phone 2: middle layer, left — My Pantry -->
    <div class="phone phone-2">
      <div class="di"></div>
      <img src="souspantry-2.PNG" alt="My Pantry screen">
    </div>

    <!-- Phone 1: top layer, center — Home -->
    <div class="phone phone-1">
      <div class="di"></div>
      <img src="souspantry-1.PNG" alt="Home screen">
    </div>

  </div>

</div>

</body>
</html>
